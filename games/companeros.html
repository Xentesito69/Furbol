<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Compañeros — Furbol</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <style>
    .comp-area { max-width: 860px; margin: 0 auto; }
    .pair {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 12px; align-items: stretch;
      margin-bottom: 22px;
    }
    .pair-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-card);
      padding: 22px;
      text-align: center;
    }
    .pair-card img.photo { width: 90px; height: 90px; border-radius: 50%; object-fit: cover; border: 3px solid var(--border-accent); margin-bottom: 10px; }
    .pair-card .pname { font-family: var(--font-main); font-weight: 800; font-size: 1.2rem; }
    .pair-card .pclub { font-size: 0.84rem; color: var(--text-secondary); margin-top: 4px; }
    .pair-card .career { margin-top: 12px; font-size: 0.78rem; color: var(--text-muted); }
    .pair-vs {
      display: flex; align-items: center; justify-content: center;
      width: 48px; height: 48px;
      align-self: center;
      border-radius: 50%; background: var(--surface); border: 1px solid var(--border);
      box-shadow: var(--shadow-card);
      font-family: var(--font-main); font-weight: 900; color: var(--accent-blue);
    }
    .choice-row {
      display: flex; gap: 12px; justify-content: center;
      margin-top: 8px;
    }
    .choice-btn {
      padding: 14px 28px;
      border-radius: var(--radius-md);
      font-family: var(--font-main); font-weight: 800;
      font-size: 1rem;
      cursor: pointer; border: 1px solid var(--border-strong);
      background: var(--surface); color: var(--text-primary);
      transition: all var(--transition);
      min-width: 130px;
    }
    .choice-btn:hover { background: var(--bg-elev); border-color: var(--accent-blue); color: var(--accent-blue); }
    .choice-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .verdict {
      display: none; text-align: center; margin-top: 18px;
      padding: 14px; border-radius: var(--radius-md);
      font-family: var(--font-main); font-weight: 800;
    }
    .verdict.right { background: var(--bg-win); color: var(--accent-green); border: 1px solid #b4dcbc; }
    .verdict.wrong { background: var(--bg-lose); color: var(--accent-red); border: 1px solid #f0b8b8; }
    .verdict .why { font-weight: 500; font-size: 0.85rem; margin-top: 6px; color: var(--text-secondary); }

    .lives { display: flex; gap: 4px; font-size: 1.3rem; justify-content: center; margin-bottom: 14px; }
    .life.lost { filter: grayscale(1) opacity(0.3); }

    .chip-row { display: flex; gap: 8px; justify-content: center; margin-bottom: 18px; flex-wrap: wrap; }
    .chip {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 12px; border-radius: 999px;
      background: var(--surface); border: 1px solid var(--border);
      font-size: 0.78rem; font-weight: 600; color: var(--text-secondary);
    }
    .chip strong { color: var(--accent-blue); font-family: var(--font-main); font-weight: 800; }

    .end-overlay {
      display: none; text-align: center; padding: 30px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-lg); margin-top: 24px;
      box-shadow: var(--shadow-card);
    }
    .end-overlay h2 { color: var(--accent-red); margin-bottom: 6px; }

    @media (max-width: 720px) {
      .pair { grid-template-columns: 1fr; gap: 8px; }
      .pair-vs { margin: 4px auto; }
    }
  </style>
</head>
<body>

<header class="navbar" id="navbar">
  <div class="container navbar__inner">
    <a href="../index.html" class="navbar__logo"><img src="../images/LogoPrincipalFurbol.png" alt="Furbol"/>Furbol</a>
    <a href="../index.html" class="btn btn--outline" style="padding:8px 16px; font-size:0.9rem;">← Volver</a>
  </div>
</header>

<main class="game-page">
  <div class="container comp-area">
    <div class="game-header">
      <div class="section__eyebrow">🤝 Juego #5</div>
      <h1 class="game-header__title">¿Compañeros?</h1>
      <p class="game-header__sub">¿Juegan ahora mismo en el mismo club (temporada 25/26)?</p>
    </div>

    <div class="chip-row">
      <div class="chip">Racha: <strong id="chip-streak">0</strong></div>
      <div class="chip">Mejor: <strong id="chip-best">0</strong></div>
    </div>
    <div class="lives" id="lives-row">
      <span class="life">❤️</span><span class="life">❤️</span><span class="life">❤️</span>
    </div>

    <div class="pair" id="pair"></div>

    <div class="choice-row">
      <button class="choice-btn" id="btn-yes">✓ Sí</button>
      <button class="choice-btn" id="btn-no">✗ No</button>
    </div>

    <div class="verdict" id="verdict"></div>

    <div class="end-overlay" id="end-overlay">
      <h2>¡Game Over!</h2>
      <p id="end-summary" style="color:var(--text-secondary); margin-bottom:14px;"></p>
      <button class="btn btn--primary" onclick="startComp()">Volver a jugar</button>
    </div>
  </div>
</main>

<script src="../data/players.js"></script>
<script src="../js/db.js"></script>
  <script src="../js/album.js"></script>
<script src="../js/games/companeros.js"></script>
</body>
</html>
