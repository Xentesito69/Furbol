<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Carrera de Clubs — Furbol</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <style>
    .car-area { max-width: 760px; margin: 0 auto; }
    .player-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-card);
      padding: 22px;
      display: flex; gap: 18px; align-items: center;
      margin-bottom: 22px;
    }
    .player-card img.photo { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 3px solid var(--border-accent); flex-shrink:0; }
    .player-card .pname { font-family: var(--font-main); font-weight: 800; font-size: 1.3rem; }
    .player-card .pmeta { color: var(--text-secondary); font-size: 0.88rem; margin-top: 4px; }
    .player-card .hint  { color: var(--text-muted); font-size: 0.78rem; margin-top: 6px; }

    .instructions {
      background: var(--bg-elev); border: 1px solid var(--border-accent);
      padding: 12px 16px; border-radius: var(--radius-md);
      color: var(--text-primary); font-size: 0.88rem;
      margin-bottom: 18px;
    }

    .sortable {
      display: flex; flex-direction: column; gap: 8px;
      margin-bottom: 16px;
    }
    .club-pill {
      display: flex; align-items: center; gap: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 12px 14px;
      cursor: grab;
      transition: all 0.15s;
      box-shadow: var(--shadow-card);
    }
    .club-pill:hover { border-color: var(--accent-blue); }
    .club-pill.dragging { opacity: 0.4; }
    .club-pill .order-num {
      display: inline-flex; align-items: center; justify-content: center;
      width: 28px; height: 28px;
      background: var(--accent-blue); color: #fff;
      font-family: var(--font-main); font-weight: 800;
      border-radius: 50%; font-size: 0.85rem;
      flex-shrink: 0;
    }
    .club-pill .arrows {
      display: flex; flex-direction: column; gap: 2px;
      margin-left: auto;
    }
    .club-pill .arrows button {
      background: #f0f6ff; border: 1px solid var(--border);
      width: 26px; height: 22px; border-radius: 4px;
      cursor: pointer; font-size: 0.7rem;
      color: var(--accent-blue);
    }
    .club-pill .arrows button:hover { background: var(--accent-blue); color: #fff; }
    .club-pill .arrows button:disabled { opacity: 0.3; cursor: not-allowed; }

    .club-pill.right { background: var(--bg-win); border-color: #b4dcbc; }
    .club-pill.wrong { background: var(--bg-lose); border-color: #f0b8b8; }

    .actions { display: flex; gap: 10px; justify-content: center; margin-bottom: 18px; }

    .end-overlay {
      display: none; text-align: center; padding: 28px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-lg); margin-top: 14px;
      box-shadow: var(--shadow-card);
    }
    .end-overlay.win  { border-color: var(--accent-green); background: #f3fbf5; }
    .end-overlay.fail { border-color: var(--accent-red);   background: #fef5f5; }
    .end-overlay h2 { margin-bottom: 6px; }
    .end-overlay.win h2 { color: var(--accent-green); }
    .end-overlay.fail h2 { color: var(--accent-red); }

    .chip-row { display: flex; gap: 8px; justify-content: center; margin-bottom: 18px; flex-wrap: wrap; }
    .chip { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 999px; background: var(--surface); border: 1px solid var(--border); font-size: 0.78rem; font-weight: 600; color: var(--text-secondary); }
    .chip strong { color: var(--accent-blue); font-family: var(--font-main); font-weight: 800; }
  </style>
</head>
<body>

<header class="navbar" id="navbar">
  <div class="container navbar__inner">
    <a href="../index.html" class="navbar__logo"><img src="../images/LogoPrincipalFurbol.png" alt="Furbol"/>Furbol</a>
    <a href="../index.html" class="btn btn--outline" style="padding:8px 16px; font-size:0.9rem;">? Volver</a>
  </div>
</header>

<main class="game-page">
  <div class="container car-area">
    <div class="game-header">
      <div class="section__eyebrow">??? Juego #6</div>
      <h1 class="game-header__title">Carrera de Clubs</h1>
      <p class="game-header__sub">Ordena los clubs por los que pasó el jugador (del primero al actual).</p>
    </div>

    <div class="chip-row">
      <div class="chip">Resueltos: <strong id="chip-wins">0</strong></div>
      <div class="chip">Mejor racha: <strong id="chip-streak">0</strong></div>
    </div>

    <div class="player-card" id="player-card"></div>

    <div class="instructions">
      Arrastra (o usa las flechas) para ordenar de <strong>antiguo ? actual</strong>. Pulsa "Comprobar".
    </div>

    <div class="sortable" id="sortable"></div>

    <div class="actions">
      <button class="btn btn--primary" id="btn-check">Comprobar</button>
      <button class="btn btn--outline" id="btn-skip">Saltar jugador</button>
    </div>

    <div class="end-overlay" id="end-overlay"></div>
  </div>
</main>

<script src="../data/players.js"></script>
<script src="../js/db.js"></script>
<script src="../js/album.js"></script>
<script src="../js/games/carrera.js"></script>
</body>
</html>
