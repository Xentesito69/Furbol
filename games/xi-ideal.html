<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Arma tu XI — Furbol</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <style>
    .xi-area { max-width: 920px; margin: 0 auto; }

    .pitch {
      background: linear-gradient(135deg, #2e7d32, #1b5e20);
      border-radius: var(--radius-lg);
      padding: 24px 16px;
      position: relative;
      margin-bottom: 18px;
      min-height: 540px;
      box-shadow: var(--shadow-card);
    }
    .pitch::before {
      content: '';
      position: absolute;
      inset: 14px;
      border: 2px solid rgba(255,255,255,0.35);
      border-radius: var(--radius-md);
      pointer-events: none;
    }
    .pitch::after {
      content: '';
      position: absolute;
      left: 50%; top: 50%;
      width: 80px; height: 80px;
      border: 2px solid rgba(255,255,255,0.35);
      border-radius: 50%;
      transform: translate(-50%,-50%);
      pointer-events: none;
    }

    .line {
      display: flex; gap: 12px; justify-content: space-around;
      margin: 14px 0;
      position: relative; z-index: 2;
    }
    .slot {
      width: 84px; min-height: 100px;
      background: rgba(255,255,255,0.1);
      border: 2px dashed rgba(255,255,255,0.4);
      border-radius: var(--radius-md);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 4px;
      color: #fff; font-family: var(--font-main); font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
      position: relative;
    }
    .slot.over { border-style: solid; background: rgba(255,255,255,0.2); }
    .slot.filled {
      background: rgba(0,0,0,0.3);
      color: #fff;
      border-color: rgba(255,255,255,0.6);
      border-style: solid;
    }
    .slot img.photo { 
      width: 60px; height: 72px; 
      border-radius: 8px; 
      object-fit: cover; 
      object-position: top; 
      border: none; 
      margin-top: 2px;
    }
    .slot .name { 
      font-size: 0.6rem; 
      text-align: center; 
      font-weight: 700;
      margin-top: 4px; 
      padding: 0 2px; 
      max-width: 76px; 
      overflow: hidden; 
      text-overflow: ellipsis; 
      white-space: nowrap; 
      text-shadow: 0 1px 3px rgba(0,0,0,0.8);
    }
    .slot .pos-label { font-size: 0.65rem; opacity: 0.7; }
    .slot .remove {
      position: absolute; top: -6px; right: -6px;
      width: 20px; height: 20px;
      border-radius: 50%; background: rgba(220,50,50,0.9);
      color: #fff; border: 2px solid #fff; font-size: 0.7rem; font-weight: 800;
      cursor: pointer; display: none; align-items: center; justify-content: center; z-index: 10;
    }
    .slot.filled .remove { display: flex; }

    .bench {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 14px;
      box-shadow: var(--shadow-card);
    }
    .bench-title { font-family: var(--font-main); font-weight: 800; margin-bottom: 10px; color: var(--text-primary); }
    .bench-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 8px;
    }
    .bench-card {
      background: var(--bg-elev);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 8px;
      text-align: center;
      cursor: pointer;
      transition: all 0.15s;
      display: flex; flex-direction: column;
      align-items: center; gap: 4px;
    }
    .bench-card:hover { background: var(--bg-elev); border-color: var(--accent-blue); transform: translateY(-2px); }
    .bench-card.used { opacity: 0.35; pointer-events: none; }
    .bench-card img.photo { width: 38px; height: 38px; border-radius: 50%; object-fit: cover; }
    .bench-card .nm { font-size: 0.72rem; font-weight: 700; }
    .bench-card .meta { font-size: 0.62rem; color: var(--text-secondary); }
    .bench-card .badge-pos {
      display: inline-block; padding: 1px 6px;
      border-radius: 4px;
      font-size: 0.6rem; font-weight: 800;
      color: #fff; margin-top: 2px;
    }
    .badge-pos.GK  { background: #1976d2; }
    .badge-pos.DEF { background: #2e7d32; }
    .badge-pos.MID { background: #6a1b9a; }
    .badge-pos.FWD { background: #c62828; }

    .controls { display: flex; gap: 10px; justify-content: center; margin: 18px 0; flex-wrap: wrap; }

    .summary {
      display: none;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 18px; margin-top: 18px; text-align: center;
      box-shadow: var(--shadow-card);
    }
    .summary.show { display: block; }
    .summary .total {
      font-family: var(--font-main); font-weight: 900;
      font-size: 2rem; color: var(--accent-blue);
      margin: 8px 0;
    }
  </style>
</head>
<body>

<header class="navbar" id="navbar">
  <div class="container navbar__inner">
    <a href="../index.html" class="navbar__logo"><img src="../images/LogoPrincipalFurbol.png" alt="Furbol"/>Furbol</a>
    <a href="../index.html" class="btn btn--outline" style="padding:8px 16px; font-size:0.9rem;">← Volver</a>
  </div>
</header>

<main class="game-page">
  <div class="container xi-area">
    <div class="game-header">
      <div class="section__eyebrow">📋 Juego #8</div>
      <h1 class="game-header__title">Arma tu XI</h1>
      <p class="game-header__sub">Tienes 18 jugadores aleatorios. Forma el mejor 4-3-3 posible.</p>
    </div>

    <!-- Campo -->
    <div class="pitch" id="pitch">
      <div class="line" data-pos="FWD" data-count="3"></div>
      <div class="line" data-pos="MID" data-count="3"></div>
      <div class="line" data-pos="DEF" data-count="4"></div>
      <div class="line" data-pos="GK"  data-count="1"></div>
    </div>

    <div class="controls">
      <button class="btn btn--outline" id="btn-new">🔀 Nuevos jugadores</button>
      <button class="btn btn--primary" id="btn-finish">Comprobar XI</button>
    </div>

    <!-- Banquillo -->
    <div class="bench">
      <div class="bench-title">Banquillo</div>
      <div class="bench-grid" id="bench"></div>
    </div>

    <div class="summary" id="summary"></div>
  </div>
</main>

<script src="../data/players.js"></script>
<script src="../js/db.js"></script>
<script src="../js/games/xi-ideal.js"></script>
</body>
</html>
