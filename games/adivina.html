<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Adivina el Jugador — Furbol</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <style>
    .game-area { max-width: 920px; margin: 0 auto; }

    .game-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 24px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 999px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-secondary);
    }
    .chip strong { color: var(--text-primary); font-weight: 800; }

    .search-box {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
      position: relative;
    }
    .search-input {
      flex: 1;
      padding: 16px 20px;
      border-radius: var(--radius-md);
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: 1rem;
      transition: all var(--transition);
    }
    .search-input:focus {
      outline: none;
      border-color: var(--accent-blue);
      box-shadow: 0 0 0 3px rgba(25,118,210,0.15);
    }
    .search-input:disabled { opacity: 0.5; cursor: not-allowed; }

    .suggestions {
      position: absolute;
      top: 100%; left: 0; right: 0;
      margin-top: 8px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      max-height: 280px;
      overflow-y: auto;
      z-index: 50;
      display: none;
      box-shadow: var(--shadow-card);
    }
    .suggestion-item {
      padding: 12px 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--border);
    }
    .suggestion-item:last-child { border-bottom: none; }
    .suggestion-item:hover, .suggestion-item.active { background: var(--bg-card-hover); }
    .suggestion-item .flag { font-size: 1.4rem; }
    .suggestion-item .meta {
      font-size: 0.74rem; color: var(--text-secondary);
    }

    .guesses-container {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 24px;
    }

    .guess-row {
      display: grid;
      grid-template-columns: 1.6fr 1.1fr 1.1fr 1.3fr 0.9fr 0.9fr 1fr;
      gap: 6px;
      animation: rowIn 0.4s ease forwards;
    }
    @keyframes rowIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .guess-cell {
      background: var(--bg-card);
      border: 1px solid var(--border);
      padding: 12px 8px;
      border-radius: var(--radius-sm);
      text-align: center;
      font-size: 0.82rem;
      font-weight: 600;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      gap: 4px;
      min-height: 60px;
      transition: background 0.4s, border-color 0.4s, transform 0.3s;
    }

    .guess-cell.match   { background: #2e7d32; border-color: #1b5e20; color: #fff; }
    .guess-cell.partial { background: #f9a825; border-color: #ef6c00; color: #1a1a1a; }
    .guess-cell.miss    { background: #c62828; border-color: #8e0000; color: #fff; }
    .guess-cell.match .sub, .guess-cell.miss .sub { color: rgba(255,255,255,0.92); }
    .guess-cell.partial .sub { color: rgba(0,0,0,0.7); }

    .guess-cell .arrow { font-size: 1rem; }
    .guess-cell .sub { font-size: 0.7rem; color: var(--text-secondary); font-weight: 500; }

    .guess-row.header .guess-cell {
      background: transparent;
      border: none;
      color: var(--text-secondary);
      font-size: 0.7rem;
      padding: 6px 0;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      min-height: auto;
    }

    /* End screens */
    .end-screen {
      display: none;
      text-align: center;
      padding: 36px 24px;
      border-radius: var(--radius-lg);
      margin-top: 28px;
      animation: rowIn 0.6s ease forwards;
    }
    .end-screen.win {
      background: #f3fbf5;
      border: 1px solid var(--accent-green);
    }
    .end-screen.lose {
      background: #fef5f5;
      border: 1px solid var(--accent-red);
    }
    .end-screen h2 { margin-bottom: 8px; font-size: 1.8rem; }
    .end-screen.win h2  { color: var(--accent-green); }
    .end-screen.lose h2 { color: var(--accent-red); }
    .end-screen p { color: var(--text-secondary); margin-bottom: 18px; }

    .reveal-card {
      display: inline-block;
      margin: 16px 0 8px;
      padding: 16px 24px;
      background: var(--bg-elev);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      text-align: left;
    }
    .reveal-card .big { font-family: var(--font-main); font-weight: 800; font-size: 1.4rem; }
    .reveal-card .sm  { color: var(--text-secondary); font-size: 0.9rem; }

    /* Mobile */
    @media (max-width: 720px) {
      .guess-row {
        grid-template-columns: 1fr 1fr;
        gap: 4px;
        background: var(--bg-card);
        padding: 8px;
        border-radius: var(--radius-md);
      }
      .guess-row.header { display: none; }
      .guess-cell { font-size: 0.78rem; padding: 8px 6px; min-height: 50px; }
    }
  </style>
</head>
<body>

<header class="navbar" id="navbar">
  <div class="container navbar__inner">
    <a href="../index.html" class="navbar__logo"><img src="../images/LogoPrincipalFurbol.png" alt="Furbol"/>Furbol</a>
    <a href="../index.html" class="btn btn--outline" style="padding:8px 16px; font-size:0.9rem;">? Volver</a>
  </div>
</header>

<main class="game-page">
  <div class="container game-area">

    <div class="game-header">
      <div class="section__eyebrow">?? Juego #1</div>
      <h1 class="game-header__title">Adivina el Jugador</h1>
      <p class="game-header__sub">Tienes <strong id="max-attempts-label">8</strong> intentos. Cada pista se acerca a la verdad.</p>
    </div>

    <!-- Toolbar de stats -->
    <div class="game-toolbar">
      <div style="display:flex; gap:8px; flex-wrap:wrap;">
        <div class="chip">Intentos: <strong id="chip-attempts">0/8</strong></div>
        <div class="chip">Mejor racha: <strong id="chip-streak">0</strong></div>
        <div class="chip">Ganadas: <strong id="chip-wins">0</strong></div>
      </div>
      <button class="btn btn--outline" id="btn-give-up" style="padding:8px 14px; font-size:0.85rem;">
        Rendirse
      </button>
    </div>

    <!-- Buscador -->
    <div class="search-box">
      <input type="text" id="player-search" class="search-input"
             placeholder="Escribe el nombre de un jugador..." autocomplete="off">
      <button class="btn btn--primary" id="btn-guess">Adivinar</button>
      <div class="suggestions" id="suggestions-box"></div>
    </div>

    <!-- Pantallas finales -->
    <div class="end-screen win" id="win-screen">
      <h2>ˇCorrecto! ??</h2>
      <p>Lo has adivinado en <strong id="attempts-count">0</strong> intentos.</p>
      <div class="reveal-card" id="reveal-card-win"></div>
      <div style="margin-top:16px;">
        <button class="btn btn--primary" onclick="initGame()">? Jugar de nuevo</button>
      </div>
    </div>
    <div class="end-screen lose" id="lose-screen">
      <h2>ˇSe acabaron los intentos! ??</h2>
      <p>El jugador era…</p>
      <div class="reveal-card" id="reveal-card-lose"></div>
      <div style="margin-top:16px;">
        <button class="btn btn--primary" onclick="initGame()">? Reintentar</button>
      </div>
    </div>

    <!-- Cuadrícula de intentos -->
    <div class="guesses-container" id="guesses-grid">
      <div class="guess-row header">
        <div class="guess-cell">Jugador</div>
        <div class="guess-cell">Nación</div>
        <div class="guess-cell">Liga</div>
        <div class="guess-cell">Club</div>
        <div class="guess-cell">Pos.</div>
        <div class="guess-cell">Edad</div>
        <div class="guess-cell">Valor</div>
      </div>
    </div>

  </div>
</main>

<!-- Toast container -->
<div id="toast" style="position:fixed; bottom:30px; left:50%; transform:translateX(-50%); padding:14px 22px; background:var(--bg-secondary); border:1px solid var(--border); border-radius:var(--radius-md); color:var(--text-primary); font-weight:600; box-shadow:var(--shadow-card); opacity:0; transition:opacity 0.3s, transform 0.3s; pointer-events:none; z-index:200;"></div>

<script src="../data/players.js"></script>
<script src="../js/db.js"></script>
<script src="../js/album.js"></script>
<script src="../js/games/adivina.js"></script>

</body>
</html>
