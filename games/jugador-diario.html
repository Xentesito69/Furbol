<!DOCTYPE html>
<html lang="es"><head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Jugador Diario — Furbol</title>
<link rel="stylesheet" href="../css/style.css"/>
<style>
  .ran-area { max-width: 560px; margin: 0 auto; }
  .profile {
    background: var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg);
    box-shadow:var(--shadow-card); padding:24px; text-align:center;
    animation: fadeIn 0.5s ease;
  }
  @keyframes fadeIn { from{opacity:0;transform:scale(0.96);} to{opacity:1;} }
  .profile img.photo { width:140px; height:140px; border-radius:50%; object-fit:cover; border:4px solid var(--border-accent); margin-bottom:14px; }
  .profile .pname { font-family:var(--font-main); font-weight:900; font-size:1.8rem; }
  .profile .pnat { display:flex; gap:8px; align-items:center; justify-content:center; margin-top:6px; font-size:0.95rem; color:var(--text-secondary); }
  .profile .pclub { display:flex; gap:8px; align-items:center; justify-content:center; margin-top:8px; font-family:var(--font-main); font-weight:700; }
  .profile .meta-row { display:grid; grid-template-columns:repeat(2,1fr); gap:8px; margin-top:18px; }
  .meta-pill { background:var(--bg-elev); border:1px solid var(--border); border-radius:var(--radius-md); padding:10px; font-size:0.85rem; }
  .meta-pill strong { color:var(--accent-blue); font-family:var(--font-main); font-weight:800; display:block; font-size:1.1rem; }
  .career { margin-top:16px; padding:12px; background:var(--bg-elev); border-radius:var(--radius-md); }
  .career-title { font-size:0.78rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:6px; }
  .career-list { font-size:0.88rem; color:var(--text-primary); }
  
  .action-buttons { display:flex; gap:12px; justify-content:center; margin-top:24px; flex-wrap:wrap; }
  #day-info { text-align:center; color:var(--text-secondary); font-size:0.85rem; margin-bottom:14px; }
</style>
</head><body>
<header class="navbar"><div class="container navbar__inner">
  <a href="../index.html" class="navbar__logo"><img src="../images/LogoPrincipalFurbol.png" alt=""/>Furbol</a>
  <a href="../index.html" class="btn btn--outline" style="padding:8px 16px; font-size:0.9rem;">← Volver</a>
</div></header>
<main class="game-page"><div class="container ran-area">
  <div class="game-header">
    <div class="section__eyebrow">📅 JUGADOR DIARIO</div>
    <h1 class="game-header__title">¿Lo conoces?</h1>
    <p class="game-header__sub">El mismo jugador para todos cada día. Sé sincero.</p>
  </div>
  
  <div id="day-info"></div>

  <div class="profile" id="profile"></div>
  
  <div class="action-buttons" id="actions">
    <button class="btn btn--primary" id="btn-yes" style="background:#43a047;border-color:#2e7d32;padding:14px 24px;">✅ Sí lo conozco</button>
    <button class="btn btn--outline" id="btn-no" style="color:var(--accent-red);border-color:var(--accent-red);padding:14px 24px;">❌ Ni idea</button>
  </div>
  
  <div class="end-overlay-common" id="end"></div>
  
</div></main>
<script src="../data/players.js"></script>
<script src="../js/db.js"></script>
<script src="../js/album.js"></script>
<script src="../js/games/_helpers.js"></script>
<script src="../js/games/jugador-diario.js"></script>
</body></html>
