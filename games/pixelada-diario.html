<!DOCTYPE html>
<html lang="es"><head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pixelada Diario — Furbol</title>
<link rel="stylesheet" href="../css/style.css"/>
<style>
  .pix-area { max-width: 520px; margin: 0 auto; }
  .pix-frame {
    width: 220px; height: 220px; border-radius: 50%; overflow: hidden;
    margin: 0 auto 18px; border: 4px solid var(--border-accent);
    background: var(--bg-card);
    display: flex; align-items: center; justify-content: center;
  }
  .pix-frame img {
    width: 100%; height: 100%; object-fit: cover;
    transition: filter 1.5s ease, transform 1.5s ease;
  }
  .sug-box { display:none; position:absolute; left:0; right:0; background: var(--surface); border:1px solid var(--border); border-radius:var(--radius-md); box-shadow:var(--shadow-md); z-index:10; max-height:200px; overflow:auto; }
  .sug { padding:8px 12px; cursor:pointer; display:flex; align-items:center; gap:8px; font-size:0.9rem; }
  .sug:hover { background: var(--bg-elev); }
  #day-info { text-align:center; color:var(--text-secondary); font-size:0.85rem; margin-bottom:14px; }
</style>
</head><body>
<header class="navbar"><div class="container navbar__inner">
  <a href="../index.html" class="navbar__logo"><img src="../images/LogoPrincipalFurbol.png" alt=""/>Furbol</a>
  <a href="../index.html" class="btn btn--outline" style="padding:8px 16px; font-size:0.9rem;">← Volver</a>
</div></header>
<main class="game-page"><div class="container pix-area">
  <div class="game-header">
    <div class="section__eyebrow">📅 PIXELADA DIARIO</div>
    <h1 class="game-header__title">Foto del día</h1>
    <p class="game-header__sub">La foto se va aclarando. Adivínalo antes de verlo nítido.</p>
  </div>
  <div id="day-info"></div>
  <div class="chip-row">
    <div class="chip">Nivel: <strong id="chip-level">100%</strong></div>
  </div>
  <div class="pix-frame"><img id="pix-img" src="" alt="?"/></div>
  <div style="position:relative; max-width:400px; margin:0 auto 14px;">
    <input type="text" id="pix-input" class="input" placeholder="Escribe el nombre..." autocomplete="off" style="width:100%;padding:14px 16px;border:1px solid var(--border);border-radius:var(--radius-md);font-size:1rem;"/>
    <div class="sug-box" id="sug-box"></div>
  </div>
  <div style="display:flex; gap:8px; justify-content:center;">
    <button class="btn btn--primary" id="btn-guess">Adivinar</button>
    <button class="btn btn--outline" id="btn-skip">Pasar</button>
  </div>
  <div class="end-overlay-common" id="end"></div>
</div></main>
<script src="../data/players.js"></script>
<script src="../js/db.js"></script>
<script src="../js/album.js"></script>
<script src="../js/games/_helpers.js"></script>
<script src="../js/games/pixelada-diario.js"></script>
</body></html>
