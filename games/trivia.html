<!DOCTYPE html>
<html lang="es"><head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Trivia infinita — Furbol</title>
<link rel="stylesheet" href="../css/style.css"/>
<style>
  .tr-area { max-width: 640px; margin: 0 auto; }
  .question-card {
    background: var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg);
    box-shadow:var(--shadow-card); padding:22px; margin-bottom:14px; text-align:center;
  }
  .question { font-family:var(--font-main); font-weight:800; font-size:1.2rem; margin-bottom:8px; }
  .q-photo { width:80px; height:80px; border-radius:50%; object-fit:cover; border:2px solid var(--border-accent); margin-bottom:10px; }
  .lives { display:flex; gap:4px; justify-content:center; font-size:1.2rem; margin-bottom:12px; }
  .life.lost { filter: grayscale(1) opacity(0.3); }
  .timer-bar { height:6px; background: var(--bg-elev); border-radius:3px; overflow:hidden; margin-bottom:14px; }
  .timer-fill { height:100%; background:var(--accent-blue); transition:width 0.1s linear; }
</style>
</head><body>
<header class="navbar"><div class="container navbar__inner">
  <a href="../index.html" class="navbar__logo"><img src="../images/LogoPrincipalFurbol.png" alt=""/>Furbol</a>
  <a href="../index.html" class="btn btn--outline" style="padding:8px 16px; font-size:0.9rem;">← Volver</a>
</div></header>
<main class="game-page"><div class="container tr-area">
  <div class="game-header">
    <div class="section__eyebrow">🧠 Trivia infinita</div>
    <h1 class="game-header__title">¿Cuánta racha aguantas?</h1>
  </div>
  <div class="chip-row">
    <div class="chip">Racha: <strong id="chip-streak">0</strong></div>
    <div class="chip">Mejor: <strong id="chip-best">0</strong></div>
  </div>
  <div class="lives" id="lives"><span class="life">❤️</span><span class="life">❤️</span><span class="life">❤️</span></div>
  <div class="timer-bar"><div class="timer-fill" id="timer-fill" style="width:100%;"></div></div>
  <div class="question-card" id="qcard"></div>
  <div class="mc-grid" id="options"></div>
  <div class="verdict" id="verdict"></div>
  <div class="end-overlay-common" id="end"></div>
</div></main>
<script src="../data/players.js"></script>
<script src="../js/db.js"></script>
  <script src="../js/album.js"></script>
<script src="../js/games/_helpers.js"></script>
<script src="../js/games/trivia.js"></script>
</body></html>
