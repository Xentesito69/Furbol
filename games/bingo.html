<!DOCTYPE html>
<html lang="es"><head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bingo — Furbol</title>
<link rel="stylesheet" href="../css/style.css"/>
<style>
  .bg-area { max-width: 880px; margin: 0 auto; }
  .level-bar { display:flex; gap:8px; justify-content:center; margin-bottom:14px; flex-wrap:wrap; }
  .level-btn { padding:8px 16px; border-radius:999px; background: var(--surface); border:1px solid var(--border); cursor:pointer; font-weight:700; font-size:0.85rem; color:var(--text-secondary); }
  .level-btn.active { background:var(--accent-blue); color:#fff; border-color:var(--accent-blue-2); }
  .top-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; flex-wrap:wrap; gap:10px; }
  .timer { font-family:var(--font-main); font-weight:900; font-size:1.5rem; color:var(--accent-blue); }
  .timer.warning { color: var(--accent-gold); } .timer.danger { color: var(--accent-red); }
  .lives { display:flex; gap:4px; font-size:1.2rem; }
  .lives .life.lost { filter: grayscale(1) opacity(0.3); }
  .layout { display:grid; grid-template-columns: 1fr; gap:16px; }
  @media (min-width:760px) { .layout { grid-template-columns: 1.2fr 1fr; } }
  .bingo-board { display:grid; gap:8px; }
  .bingo-cell {
    background: var(--surface); border:2px solid var(--border); border-radius:var(--radius-md);
    aspect-ratio: 1.05; padding:8px; cursor:pointer;
    display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center;
    transition: all 0.15s; font-size:0.78rem; font-weight:700;
    box-shadow:var(--shadow-card);
  }
  .bingo-cell:hover { border-color:var(--accent-blue); }
  .bingo-cell.locked { background: var(--bg-win); border-color:#2e7d32; pointer-events:none; }
  .bingo-cell.locked img.face { width:48px; height:48px; border-radius:50%; object-fit:cover; margin-bottom:4px; }
  .bingo-cell .req-icon { font-size:1.4rem; margin-bottom:4px; }
  .bingo-cell .req-text { font-size:0.7rem; line-height:1.2; }
  .draw-panel {
    background: var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg);
    padding:18px; box-shadow:var(--shadow-card); text-align:center; min-height:240px;
  }
  .draw-photo { width:120px; height:120px; border-radius:50%; object-fit:cover; border:3px solid var(--border-accent); margin-bottom:10px; }
  .draw-name { font-family:var(--font-main); font-weight:800; font-size:1.2rem; }
  .draw-actions { display:flex; gap:8px; justify-content:center; margin-top:14px; flex-wrap:wrap; }
</style>
</head><body>
<header class="navbar"><div class="container navbar__inner">
  <a href="../index.html" class="navbar__logo"><img src="../images/LogoPrincipalFurbol.png" alt=""/>Furbol</a>
  <a href="../index.html" class="btn btn--outline" style="padding:8px 16px; font-size:0.9rem;">← Volver</a>
</div></header>
<main class="game-page"><div class="container bg-area">
  <div class="game-header">
    <div class="section__eyebrow">🎰 Bingo</div>
    <h1 class="game-header__title">Rellena el cartón</h1>
    <p class="game-header__sub">Aparece un jugador. Decide qué casilla cumple. Si pasas, no la coloca.</p>
  </div>
  <div class="level-bar">
    <button class="level-btn active" data-mode="easy">Fácil · sin vidas</button>
    <button class="level-btn" data-mode="hard">Difícil · 3 vidas</button>
  </div>
  <div class="top-bar">
    <div class="chip-row">
      <div class="chip">Rellenas: <strong id="chip-filled">0</strong>/<span id="chip-total">12</span></div>
      <div class="lives" id="lives"></div>
    </div>
    <div class="timer" id="timer">2:00</div>
  </div>
  <div class="layout">
    <div class="bingo-board" id="board"></div>
    <div class="draw-panel" id="draw"></div>
  </div>
  <div class="end-overlay-common" id="end"></div>
</div></main>
<script src="../data/players.js"></script>
<script src="../js/db.js"></script>
  <script src="../js/album.js"></script>
<script src="../js/games/_helpers.js"></script>
<script src="../js/games/bingo.js"></script>
</body></html>
