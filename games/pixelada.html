<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Foto pixelada Ś Furbol</title>
<link rel="stylesheet" href="../css/style.css"/>
<style>
  .pix-area { max-width: 580px; margin: 0 auto; text-align: center; }
  .pix-frame {
    width: 280px; height: 280px;
    margin: 0 auto 18px;
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    position: relative;
    box-shadow: var(--shadow-card);
  }
  .pix-frame img {
    width: 100%; height: 100%; object-fit: cover;
    image-rendering: pixelated;
    transition: filter 0.5s, transform 0.5s;
  }
  .search-box { display: flex; gap: 8px; position: relative; margin-bottom: 12px; }
  .search-input { flex:1; padding:14px 16px; border-radius:var(--radius-md); background: var(--surface); border:1px solid var(--border); font-size:1rem; }
  .search-input:focus { outline:none; border-color:var(--accent-blue); box-shadow:0 0 0 3px rgba(25,118,210,0.15); }
  .suggestions { position:absolute; top:100%; left:0; right:0; margin-top:6px; background: var(--surface); border:1px solid var(--border); border-radius:var(--radius-md); max-height:220px; overflow-y:auto; z-index:30; display:none; box-shadow:var(--shadow-card); text-align:left; }
  .sug { padding:10px 14px; cursor:pointer; display:flex; align-items:center; gap:10px; border-bottom:1px solid var(--border); font-size:0.85rem; }
  .sug:hover { background: var(--bg-elev); }
</style>
</head>
<body>
<header class="navbar"><div class="container navbar__inner">
  <a href="../index.html" class="navbar__logo"><img src="../images/LogoPrincipalFurbol.png" alt=""/>Furbol</a>
  <a href="../index.html" class="btn btn--outline" style="padding:8px 16px; font-size:0.9rem;">? Volver</a>
</div></header>
<main class="game-page"><div class="container pix-area">
  <div class="game-header">
    <div class="section__eyebrow">?? Foto pixelada</div>
    <h1 class="game-header__title">Adivina la cara</h1>
    <p class="game-header__sub">La foto se va aclarando cada 4 segundos. Adivina antes de que se vea nĒtida.</p>
  </div>
  <div class="chip-row">
    <div class="chip">Pixelaci¾n: <strong id="chip-level">100%</strong></div>
    <div class="chip">Aciertos: <strong id="chip-wins">0</strong></div>
    <div class="chip">Mejor racha: <strong id="chip-streak">0</strong></div>
  </div>
  <div class="pix-frame"><img id="pix-img" alt=""/></div>
  <div class="search-box">
    <input type="text" id="pix-input" class="search-input" placeholder="Escribe un nombreģ" autocomplete="off"/>
    <button class="btn btn--primary" id="btn-guess">Adivinar</button>
    <div class="suggestions" id="sug-box"></div>
  </div>
  <button class="btn btn--outline" id="btn-skip">Saltar jugador</button>
  <div class="end-overlay-common" id="end"></div>
</div></main>
<script src="../data/players.js"></script>
<script src="../js/db.js"></script>
<script src="../js/album.js"></script>
<script src="../js/games/_helpers.js"></script>
<script src="../js/games/pixelada.js"></script>
</body></html>
