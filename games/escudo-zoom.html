<!DOCTYPE html>
<html lang="es"><head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Escudo Zoom — Furbol</title>
<link rel="stylesheet" href="../css/style.css"/>
<style>
  .ez-area { max-width: 620px; margin: 0 auto; text-align: center; }
  .ez-frame {
    width: 240px; height: 240px;
    margin: 0 auto 16px;
    background: var(--surface); border:2px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden; position: relative;
    box-shadow: var(--shadow-card);
  }
  .ez-frame img {
    position:absolute; width:600px; height:600px; object-fit:contain;
    transition: transform 0.5s ease;
  }
</style>
</head><body>
<header class="navbar"><div class="container navbar__inner">
  <a href="../index.html" class="navbar__logo"><img src="../images/LogoPrincipalFurbol.png" alt=""/>Furbol</a>
  <a href="../index.html" class="btn btn--outline" style="padding:8px 16px; font-size:0.9rem;">← Volver</a>
</div></header>
<main class="game-page"><div class="container ez-area">
  <div class="game-header">
    <div class="section__eyebrow">🔍 Escudo Zoom</div>
    <h1 class="game-header__title">¿Qué club es?</h1>
    <p class="game-header__sub">Te enseñamos un trozo del escudo. Adivina entre 4 opciones.</p>
  </div>
  <div class="chip-row">
    <div class="chip">Racha: <strong id="chip-streak">0</strong></div>
    <div class="chip">Mejor: <strong id="chip-best">0</strong></div>
  </div>
  <div class="ez-frame"><img id="ez-img" alt=""></div>
  <div class="mc-grid" id="options"></div>
  <div class="verdict" id="verdict"></div>
  <div class="end-overlay-common" id="end"></div>
</div></main>
<script src="../data/players.js"></script>
<script src="../js/db.js"></script>
  <script src="../js/album.js"></script>
<script src="../js/games/_helpers.js"></script>
<script src="../js/games/escudo-zoom.js"></script>
</body></html>
