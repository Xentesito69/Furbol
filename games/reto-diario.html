<!DOCTYPE html>
<html lang="es"><head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Adivina Diario — Furbol</title>
<link rel="stylesheet" href="../css/style.css"/>
<style>
  .rd-area { max-width: 920px; margin: 0 auto; }
  .day-info { background: var(--bg-elev); border:1px solid var(--border-accent); padding:10px 16px; border-radius:var(--radius-md); text-align:center; margin-bottom:14px; font-weight:600; }
  .search-box { display:flex; gap:8px; position:relative; margin-bottom:14px; }
  .search-input { flex:1; padding:14px 18px; border-radius:var(--radius-md); background: var(--surface); border:1px solid var(--border); font-size:1rem; }
  .search-input:focus { outline:none; border-color:var(--accent-blue); box-shadow:0 0 0 3px rgba(25,118,210,0.15); }
  .suggestions { position:absolute; top:100%; left:0; right:0; margin-top:6px; background: var(--surface); border:1px solid var(--border); border-radius:var(--radius-md); max-height:260px; overflow-y:auto; z-index:30; display:none; box-shadow:var(--shadow-card); }
  .sug { padding:10px 14px; cursor:pointer; display:flex; align-items:center; gap:10px; border-bottom:1px solid var(--border); font-size:0.85rem; }
  .sug:hover { background: var(--bg-elev); }
  .guesses { display:flex; flex-direction:column; gap:6px; }
  .grow { display:grid; grid-template-columns:1.4fr 1fr 1fr 1.2fr 0.8fr 0.8fr 0.9fr; gap:5px; animation: rowIn 0.3s ease; }
  @keyframes rowIn { from{opacity:0;transform:translateY(8px);} to{opacity:1;} }
  .gcell { background: var(--surface); border:1px solid var(--border); padding:10px 6px; border-radius:var(--radius-sm); text-align:center; font-size:0.78rem; font-weight:600; min-height:50px; display:flex; flex-direction:column; justify-content:center; align-items:center; gap:3px; }
  .gcell.match { background:#2e7d32; color:#fff; border-color:#1b5e20; }
  .gcell.partial { background:#f9a825; color:#1a1a1a; border-color:#ef6c00; }
  .gcell.miss { background:#c62828; color:#fff; border-color:#8e0000; }
  .grow.header .gcell { background:transparent; border:none; font-size:0.65rem; text-transform:uppercase; color:var(--text-secondary); padding:4px 0; min-height:auto; }
  @media (max-width:720px) { .grow { grid-template-columns: 1fr 1fr; } .grow.header { display:none; } }
</style>
</head><body>
<header class="navbar"><div class="container navbar__inner">
  <a href="../index.html" class="navbar__logo"><img src="../images/LogoPrincipalFurbol.png" alt=""/>Furbol</a>
  <a href="../index.html" class="btn btn--outline" style="padding:8px 16px; font-size:0.9rem;">← Volver</a>
</div></header>
<main class="game-page"><div class="container rd-area">
  <div class="game-header">
    <div class="section__eyebrow">📅 ADIVINA DIARIO</div>
    <h1 class="game-header__title">Adivina del día</h1>
    <p class="game-header__sub">El mismo jugador para todos. 8 intentos.</p>
  </div>
  <div class="day-info" id="day-info">Cargando…</div>
  <div class="chip-row">
    <div class="chip">Intentos: <strong id="chip-attempts">0/8</strong></div>
    <div class="chip">Racha diaria: <strong id="chip-streak">0</strong></div>
  </div>
  <div class="search-box">
    <input type="text" id="rd-input" class="search-input" placeholder="Escribe un nombre…" autocomplete="off"/>
    <button class="btn btn--primary" id="btn-guess">Adivinar</button>
    <div class="suggestions" id="sug-box"></div>
  </div>
  <div class="guesses" id="guesses">
    <div class="grow header"><div class="gcell">Jugador</div><div class="gcell">Nación</div><div class="gcell">Liga</div><div class="gcell">Club</div><div class="gcell">Pos.</div><div class="gcell">Edad</div><div class="gcell">Valor</div></div>
  </div>
  <div class="end-overlay-common" id="end"></div>
</div></main>
<script src="../data/players.js"></script>
<script src="../js/db.js"></script>
<script src="../js/games/_helpers.js"></script>
<script src="../js/games/reto-diario.js"></script>
</body></html>
