<!DOCTYPE html>
<html lang="es"><head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Puzzle Diario — Furbol</title>
<link rel="stylesheet" href="../css/style.css"/>
<style>
  .pz-area { max-width: 820px; margin: 0 auto; }
  .pz-hud { display:flex; gap:20px; align-items:center; justify-content:center; margin-bottom:14px; flex-wrap:wrap; }
  .pz-stat { font-family:var(--font-main); font-weight:800; font-size:1.1rem; color:var(--accent-blue);
             display:flex; flex-direction:column; align-items:center; }
  .pz-stat small { font-size:0.68rem; font-weight:400; color:var(--text-muted); }
  .pz-layout { display: flex; gap: 14px; align-items: flex-start; justify-content: center; }
  #pz-board {
    display: grid; gap: 3px; background: #1e293b; border-radius: 10px; padding: 4px; box-shadow: 0 6px 24px rgba(0,0,0,0.25); flex-shrink: 0;
  }
  .board-cell {
    border-radius: 4px; background: rgba(255,255,255,0.07); border: 2px dashed rgba(255,255,255,0.22);
    cursor: pointer; transition: border-color .12s, background .12s; overflow: hidden; position: relative;
  }
  .board-cell.target   { border-color: var(--accent-blue); background: rgba(37,99,235,0.18); }
  .board-cell.correct  { border: 2px solid #43a047 !important; }
  .board-cell.drag-over{ border-color: #f59e0b; background: rgba(245,158,11,0.18); }
  .board-cell.dragging { opacity: 0.3; }
  .board-cell .piece-inner { width:100%; height:100%; background-repeat:no-repeat; cursor:grab; }
  .board-cell .piece-inner:active { cursor:grabbing; }
  .tray-panel {
    flex-shrink: 0; width: 210px; background: #f1f5f9; border: 2px solid var(--border); border-radius: 12px;
    padding: 10px; display: flex; flex-direction: column; gap: 8px; transition: border-color .15s, background .15s;
  }
  .tray-panel.drag-over { border-color: #f59e0b; background: #fffbeb; }
  .tray-label {
    text-align:center; font-size:0.72rem; font-weight:800; text-transform:uppercase; letter-spacing:.06em; color:var(--text-muted);
  }
  #pz-tray { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; overflow-y: auto; max-height: 400px; }
  .tray-piece {
    border-radius: 6px; border: 3px solid transparent; cursor: pointer; transition: border-color .12s, transform .1s, box-shadow .12s;
    box-shadow: 0 2px 6px rgba(0,0,0,0.18); background-repeat: no-repeat; aspect-ratio: 1; background-size: cover;
  }
  .tray-piece:hover   { transform: scale(1.06); border-color: var(--accent-blue); }
  .tray-piece.selected { border-color: var(--accent-blue); box-shadow: 0 0 0 3px rgba(37,99,235,0.4), 0 4px 12px rgba(0,0,0,0.25); transform: scale(1.05); }
  .pz-actions { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; margin-top:14px; }
  #pz-win { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.65); z-index:100; align-items:center; justify-content:center; }
  #pz-win.show { display:flex; }
  .pz-win-card { background: var(--surface); border-radius:var(--radius-lg); padding:32px; text-align:center; max-width:360px; width:90%; box-shadow:0 20px 60px rgba(0,0,0,0.4); animation: popIn .3s cubic-bezier(.2,1.3,.5,1); }
  @keyframes popIn { from{transform:scale(0.7);opacity:0} to{transform:scale(1);opacity:1} }
  .pz-win-card h2 { font-family:var(--font-main); font-size:1.8rem; margin-bottom:8px; }
  .pz-win-photo { width:200px; height:100px; border-radius:10px; object-fit:cover; border:3px solid #43a047; margin:12px auto; display:block; }
  .pz-win-meta { color:var(--text-secondary); font-size:0.9rem; margin-bottom:16px; }
  @media (max-width: 660px){
    .pz-layout { flex-direction: column; align-items: center; }
    .tray-panel { width: 100%; max-width: 480px; }
    #pz-tray { grid-template-columns: repeat(4, 1fr); max-height: 220px; }
  }
  #day-info { text-align:center; color:var(--text-secondary); font-size:0.85rem; margin-bottom:14px; }
</style>
</head><body>
<header class="navbar"><div class="container navbar__inner">
  <a href="../index.html" class="navbar__logo"><img src="../images/LogoPrincipalFurbol.png" alt=""/>Furbol</a>
  <a href="../index.html" class="btn btn--outline" style="padding:8px 16px; font-size:0.9rem;">← Volver</a>
</div></header>

<main class="game-page"><div class="container pz-area">
  <div class="game-header">
    <div class="section__eyebrow">📅 PUZZLE DIARIO</div>
    <h1 class="game-header__title">Puzzle Diario</h1>
    <p class="game-header__sub">16 piezas. La misma imagen para todos.</p>
  </div>
  
  <div id="day-info"></div>

  <div class="pz-hud">
    <div class="pz-stat" id="pz-time">0:00<small>Tiempo</small></div>
    <div class="pz-stat" id="pz-moves">0<small>Movimientos</small></div>
    <div class="pz-stat" id="pz-placed">0 / <span id="pz-total">16</span><small>Colocadas</small></div>
  </div>

  <div class="pz-layout">
    <div id="pz-board"></div>
    <div class="tray-panel">
      <div class="tray-label">🧩 Piezas</div>
      <div id="pz-tray"></div>
    </div>
  </div>

  <div class="pz-actions">
    <button class="btn btn--outline" id="btn-shuffle">↺ Rebarajar</button>
  </div>

  <div id="pz-win">
    <div class="pz-win-card">
      <h2>¡Completado! 🎉</h2>
      <img id="win-photo" class="pz-win-photo" src="" alt=""/>
      <p class="pz-win-meta" id="win-meta"></p>
      <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;">
        <button class="btn btn--outline" onclick="document.getElementById('pz-win').classList.remove('show')">Ver puzzle</button>
        <button class="btn btn--primary" id="btn-share">📋 Copiar resultado</button>
      </div>
    </div>
  </div>
</div></main>

<script src="../data/players.js"></script>
<script src="../js/db.js"></script>
<script src="../js/album.js"></script>
<script src="../js/games/_helpers.js"></script>
<script src="../js/games/puzzle-diario.js"></script>
</body></html>
